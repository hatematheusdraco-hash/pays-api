<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayS Dashboard</title>
<style>
  :root {
    --bg: #0b1020; --card: #141a2e; --line: #24304d; --muted: #8b98b8;
    --text: #eef2fb; --accent: #5b8cff; --good: #3ecf8e; --bad: #ff6b6b; --warn: #f7b955;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text); }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 16px 22px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #0b1020ee; backdrop-filter: blur(8px); }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; }
  .brand .dot { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), #9b6bff); }
  main { max-width: 900px; margin: 0 auto; padding: 22px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; margin-bottom: 18px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
  input, select { width: 100%; font: inherit; color: var(--text); background: #10162b;
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
  .rowf { display: flex; gap: 12px; flex-wrap: wrap; } .rowf > div { flex: 1; min-width: 140px; }
  button { font: inherit; color: #08122e; background: var(--accent); border: 0; border-radius: 10px;
    padding: 10px 16px; font-weight: 700; cursor: pointer; margin-top: 14px; }
  button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 500; }
  button:hover { filter: brightness(1.08); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
  code { font-family: ui-monospace, monospace; font-size: 12px; color: var(--accent); word-break: break-all; }
  .pill { padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .s-COMPLETED { background: #123524; color: var(--good); }
  .s-FAILED, .s-CANCELED { background: #351a1a; color: var(--bad); }
  .s-CREATED, .s-QUOTE_LOCKED, .s-PAYMENT_DETECTED, .s-CONFIRMING, .s-CONVERTING, .s-SETTLING { background: #2a2140; color: var(--warn); }
  .muted { color: var(--muted); } .hide { display: none; }
  .note { background: #10162b; border: 1px dashed var(--line); border-radius: 10px; padding: 12px; margin-top: 12px; word-break: break-all; }
  a { color: var(--accent); }
  .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span> PayS · Merchant Dashboard</div>
  <div class="flex"><span id="who" class="muted"></span><button id="logout" class="ghost hide">Log out</button></div>
</header>
<main>
  <div id="err" class="card hide" style="border-color:var(--bad);color:var(--bad)"></div>

  <!-- Onboarding / login -->
  <section id="auth" class="card">
    <h2>Connect</h2>
    <p class="muted">Paste an existing API key, or create a test account to get one.</p>
    <label>API key (sk_test_…)</label>
    <input id="key" placeholder="sk_test_…" autocomplete="off" />
    <div class="flex">
      <button id="connect">Connect</button>
      <button id="create" class="ghost">Create test account</button>
    </div>
    <div id="newkey" class="note hide"></div>
  </section>

  <!-- Create payment -->
  <section id="app" class="hide">
    <div class="card">
      <h2>Payouts — where you receive funds</h2>
      <p class="muted" style="margin-top:-6px">Payments settle here after each purchase.</p>
      <div class="rowf">
        <div>
          <label>Method</label>
          <select id="smethod">
            <option value="sepa">SEPA bank transfer (EUR)</option>
            <option value="usdc">USDC to wallet</option>
            <option value="payoneer">Payoneer</option>
          </select>
        </div>
        <div>
          <label id="sdestLabel">IBAN</label>
          <input id="sdest" placeholder="DE89 3704 0044 0532 0130 00" />
        </div>
      </div>
      <button id="savePayout">Save payout details</button>
      <span id="payoutSaved" class="muted hide" style="margin-left:12px">Saved ✓</span>
    </div>

    <div class="card">
      <h2>New payment</h2>
      <div class="rowf">
        <div><label>Amount</label><input id="amt" type="number" value="49.99" step="0.01" /></div>
        <div><label>Currency</label><select id="ccy"><option>EUR</option><option>USD</option><option>USDC</option></select></div>
        <div><label>Description</label><input id="pdesc" value="Pro plan — monthly" /></div>
      </div>
      <button id="createPay">Create payment + checkout link</button>
      <div id="link" class="note hide"></div>
    </div>

    <div class="card">
      <div class="flex" style="justify-content:space-between">
        <h2 style="margin:0">Payments</h2>
        <button id="refresh" class="ghost" style="margin:0">Refresh</button>
      </div>
      <table style="margin-top:14px">
        <thead><tr><th>ID</th><th>Amount</th><th>Status</th><th>Crypto</th><th></th></tr></thead>
        <tbody id="rows"><tr><td colspan="5" class="muted">No payments yet.</td></tr></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);
const show = (s, on = true) => $(s).classList.toggle('hide', !on);
const fail = (m) => { $('#err').textContent = m; show('#err', true); setTimeout(() => show('#err', false), 6000); };
let KEY = localStorage.getItem('pays_key') || '';

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'content-type': 'application/json', ...(KEY ? { authorization: 'Bearer ' + KEY } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error?.message || ('HTTP ' + res.status));
  return json;
}

$('#create').onclick = async () => {
  try {
    const r = await api('POST', '/v1/merchants', {
      name: 'Test Merchant', email: 'test+' + Date.now() + '@pays.dev', settlement_method: 'sepa',
      settlement_destination: { iban: 'DE89 3704 0044 0532 0130 00', name: 'Test Merchant GmbH' },
    });
    KEY = r.api_key.secret;
    $('#newkey').innerHTML = 'Your API key (save it): <code>' + KEY + '</code>';
    show('#newkey', true); $('#key').value = KEY;
    connect();
  } catch (e) { fail(e.message); }
};

$('#connect').onclick = () => { KEY = $('#key').value.trim(); connect(); };
$('#logout').onclick = () => { localStorage.removeItem('pays_key'); location.reload(); };

const DEST_KEY = { sepa: 'iban', usdc: 'address', payoneer: 'email' };
const DEST_LABEL = { sepa: 'IBAN', usdc: 'Wallet address', payoneer: 'Payoneer email' };
const DEST_PLACEHOLDER = {
  sepa: 'DE89 3704 0044 0532 0130 00',
  usdc: '0x1234…abcd',
  payoneer: 'you@example.com',
};
function updateDestLabel() {
  const m = $('#smethod').value;
  $('#sdestLabel').textContent = DEST_LABEL[m];
  $('#sdest').placeholder = DEST_PLACEHOLDER[m];
}

async function connect() {
  if (!KEY) return fail('Enter an API key.');
  try {
    const me = await api('GET', '/v1/merchants/me');
    localStorage.setItem('pays_key', KEY);
    $('#who').textContent = me.name + ' · ' + me.email;
    show('#auth', false); show('#app', true); show('#logout', true);
    fillPayout(me);
    loadPayments();
  } catch (e) { fail('Could not connect: ' + e.message); }
}

function fillPayout(me) {
  $('#smethod').value = me.settlement_method || 'sepa';
  updateDestLabel();
  const key = DEST_KEY[$('#smethod').value];
  const dest = me.settlement_destination || {};
  $('#sdest').value = dest[key] || '';
}

$('#smethod').onchange = updateDestLabel;
$('#savePayout').onclick = async () => {
  try {
    const method = $('#smethod').value;
    const dest = {}; dest[DEST_KEY[method]] = $('#sdest').value.trim();
    await api('PATCH', '/v1/merchants/me', {
      settlement_method: method, settlement_destination: dest,
    });
    show('#payoutSaved', true);
    setTimeout(() => show('#payoutSaved', false), 2500);
  } catch (e) { fail(e.message); }
};

$('#createPay').onclick = async () => {
  try {
    const p = await api('POST', '/v1/payments', {
      amount: Number($('#amt').value), currency: $('#ccy').value, description: $('#pdesc').value,
    });
    const url = location.origin + '/checkout/' + p.id + '?cs=' + encodeURIComponent(p.client_secret);
    $('#link').innerHTML =
      'Checkout link: <a href="' + url + '" target="_blank">' + url + '</a>' +
      ' &nbsp; <button class="ghost" style="margin:0;padding:4px 10px" onclick="navigator.clipboard.writeText(\'' + url + '\')">Copy</button>';
    show('#link', true);
    loadPayments();
  } catch (e) { fail(e.message); }
};

$('#refresh').onclick = loadPayments;

async function loadPayments() {
  try {
    const list = await api('GET', '/v1/payments');
    const rows = $('#rows');
    if (!list.data.length) { rows.innerHTML = '<tr><td colspan="5" class="muted">No payments yet.</td></tr>'; return; }
    rows.innerHTML = list.data.map((p) => {
      const url = location.origin + '/checkout/' + p.id + '?cs=' + encodeURIComponent(p.client_secret);
      const crypto = p.crypto ? (Number(p.crypto.amount).toFixed(6) + ' ' + p.crypto.currency) : '—';
      const open = ['CREATED','QUOTE_LOCKED'].includes(p.status)
        ? '<a href="' + url + '" target="_blank">Open checkout →</a>' : '';
      return '<tr><td><code>' + p.id + '</code></td>' +
        '<td>' + p.amount.toFixed(2) + ' ' + p.currency + '</td>' +
        '<td><span class="pill s-' + p.status + '">' + p.status + '</span></td>' +
        '<td class="muted">' + crypto + '</td>' +
        '<td>' + open + '</td></tr>';
    }).join('');
  } catch (e) { fail(e.message); }
}

if (KEY) { $('#key').value = KEY; connect(); }
</script>
</body>
</html>
