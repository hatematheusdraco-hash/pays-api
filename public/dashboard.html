<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayS Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000; --bg-raise: #08090c; --card: #0c0e13; --line: #191c24; --line-soft: #12141a;
    --text: #f4f6fb; --muted: #9aa2b4; --faint: #5c6478;
    --cyan: #22e2f2; --cyan-deep: #0bb6d4; --cyan-glow: rgba(34,226,242,.16);
    --good: #22e2f2; --bad: #ff6b6b; --warn: #f7b955;
    --disp: 'Space Grotesk', sans-serif; --body: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--body); font-size: 15px; line-height: 1.5;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--cyan); color: #000; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 16px 24px; border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: rgba(0,0,0,.6); backdrop-filter: blur(14px); z-index: 10; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--disp); font-weight: 600; font-size: 17px; letter-spacing: -.01em; }
  .brand .dot { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
    color: #000; font-weight: 700; font-size: 13px; box-shadow: 0 0 22px var(--cyan-glow);
    background: linear-gradient(135deg, var(--cyan), var(--cyan-deep)); }
  main { max-width: 900px; margin: 0 auto; padding: 26px 24px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 18px; }
  h2 { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .18em; color: var(--cyan); margin: 0 0 14px; font-weight: 500; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 5px; }
  input, select { width: 100%; font-family: var(--body); font-size: 15px; color: var(--text); background: var(--bg-raise);
    border: 1px solid var(--line); border-radius: 9px; padding: 11px 13px; }
  input:focus, select:focus { outline: none; border-color: var(--cyan); }
  .rowf { display: flex; gap: 12px; flex-wrap: wrap; } .rowf > div { flex: 1; min-width: 140px; }
  button { font-family: var(--body); font-size: 14px; color: #000; background: var(--cyan); border: 0; border-radius: 9px;
    padding: 11px 18px; font-weight: 600; cursor: pointer; margin-top: 14px; transition: .2s; }
  button:hover { background: #4aeaf7; box-shadow: 0 8px 34px var(--cyan-glow); }
  button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 500; }
  button.ghost:hover { background: transparent; border-color: var(--cyan); color: var(--cyan); box-shadow: none; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 11px 8px; border-bottom: 1px solid var(--line); }
  th { color: var(--faint); font-family: var(--mono); font-weight: 500; font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; }
  code { font-family: var(--mono); font-size: 12px; color: var(--cyan); word-break: break-all; }
  .pill { padding: 4px 10px; border-radius: 100px; font-family: var(--mono); font-size: 10.5px; letter-spacing: .06em; font-weight: 500; text-transform: uppercase; }
  .s-COMPLETED { background: rgba(34,226,242,.12); color: var(--cyan); }
  .s-FAILED, .s-CANCELED { background: rgba(255,107,107,.12); color: var(--bad); }
  .s-CREATED, .s-QUOTE_LOCKED, .s-PAYMENT_DETECTED, .s-CONFIRMING, .s-CONVERTING, .s-SETTLING { background: rgba(247,185,85,.12); color: var(--warn); }
  .muted { color: var(--muted); } .hide { display: none; }
  .note { background: var(--bg-raise); border: 1px dashed var(--line); border-radius: 9px; padding: 12px; margin-top: 12px; word-break: break-all; font-family: var(--mono); font-size: 13px; }
  a { color: var(--cyan); }
  .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lang { display: inline-flex; gap: 2px; border: 1px solid var(--line); border-radius: 9px; padding: 3px; background: var(--bg-raise); }
  .lang-btn { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    background: transparent; color: var(--faint); border: none; cursor: pointer; padding: 5px 9px; border-radius: 6px; transition: .18s; line-height: 1; margin: 0; }
  .lang-btn:hover { color: var(--text); background: transparent; box-shadow: none; }
  .lang-btn.active { background: var(--cyan); color: #000; font-weight: 500; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot">P</span> PayS · Merchant Dashboard</div>
  <div class="flex">
    <span id="who" class="muted"></span>
    <div class="lang">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="uk">UK</button>
    </div>
    <button id="logout" class="ghost hide" data-i18n="logout">Log out</button>
  </div>
</header>
<main>
  <div id="err" class="card hide" style="border-color:var(--bad);color:var(--bad)"></div>

  <!-- Onboarding / login -->
  <section id="auth" class="card">
    <h2 data-i18n="connect">Connect</h2>
    <p class="muted" data-i18n="connectHint">Paste an existing API key, or create a test account to get one.</p>
    <label data-i18n="apiKeyLabel">API key (sk_test_…)</label>
    <input id="key" placeholder="sk_test_…" autocomplete="off" />
    <div class="flex">
      <button id="connect" data-i18n="connectBtn">Connect</button>
      <button id="create" class="ghost" data-i18n="createAcc">Create test account</button>
    </div>
    <div id="newkey" class="note hide"></div>
  </section>

  <!-- Create payment -->
  <section id="app" class="hide">
    <div class="card">
      <h2 data-i18n="payouts">Payouts — where you receive funds</h2>
      <p class="muted" style="margin-top:-6px" data-i18n="payoutsHint">Payments settle here after each purchase.</p>
      <div class="rowf">
        <div>
          <label data-i18n="method">Method</label>
          <select id="smethod">
            <option value="sepa" data-i18n="optSepa">SEPA bank transfer (IBAN)</option>
            <option value="ach" data-i18n="optAch">US bank account (ACH)</option>
            <option value="card" data-i18n="optCard">Bank card</option>
            <option value="usdc" data-i18n="optUsdc">USDC to wallet</option>
            <option value="payoneer" data-i18n="optPayoneer">Payoneer</option>
          </select>
        </div>
        <div>
          <label id="sdestLabel">IBAN</label>
          <input id="sdest" placeholder="DE89 3704 0044 0532 0130 00" />
        </div>
      </div>
      <button id="savePayout" data-i18n="savePayout">Save payout details</button>
      <span id="payoutSaved" class="muted hide" style="margin-left:12px" data-i18n="saved">Saved ✓</span>
    </div>

    <div class="card">
      <h2 data-i18n="newPayment">New payment</h2>
      <div class="rowf">
        <div><label data-i18n="amount">Amount</label><input id="amt" type="number" value="49.99" step="0.01" /></div>
        <div><label data-i18n="currency">Currency</label><select id="ccy"><option>EUR</option><option>USD</option><option>USDC</option></select></div>
        <div><label data-i18n="description">Description</label><input id="pdesc" value="Pro plan — monthly" /></div>
      </div>
      <button id="createPay" data-i18n="createPay">Create payment + checkout link</button>
      <div id="link" class="note hide"></div>
    </div>

    <div class="card">
      <div class="flex" style="justify-content:space-between">
        <h2 style="margin:0" data-i18n="payments">Payments</h2>
        <button id="refresh" class="ghost" style="margin:0" data-i18n="refresh">Refresh</button>
      </div>
      <table style="margin-top:14px">
        <thead><tr><th>ID</th><th data-i18n="thAmount">Amount</th><th data-i18n="thStatus">Status</th><th data-i18n="thCrypto">Crypto</th><th data-i18n="thPayout">Payout to</th><th></th></tr></thead>
        <tbody id="rows"><tr><td colspan="6" class="muted">No payments yet.</td></tr></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);
const show = (s, on = true) => $(s).classList.toggle('hide', !on);
const fail = (m) => { $('#err').textContent = m; show('#err', true); setTimeout(() => show('#err', false), 6000); };
let KEY = localStorage.getItem('pays_key') || '';

// --- i18n (EN / RU / UK) ---
const T = {
  en: {
    logout: 'Log out', connect: 'Connect',
    connectHint: 'Paste an existing API key, or create a test account to get one.',
    apiKeyLabel: 'API key (sk_test_…)', connectBtn: 'Connect', createAcc: 'Create test account',
    payouts: 'Payouts — where you receive funds', payoutsHint: 'Payments settle here after each purchase.',
    method: 'Method', savePayout: 'Save payout details', saved: 'Saved ✓',
    newPayment: 'New payment', amount: 'Amount', currency: 'Currency', description: 'Description',
    createPay: 'Create payment + checkout link', payments: 'Payments', refresh: 'Refresh',
    thAmount: 'Amount', thStatus: 'Status', thCrypto: 'Crypto', thPayout: 'Payout to',
    noPayments: 'No payments yet.', openCheckout: 'Open checkout →',
    optSepa: 'SEPA bank transfer (IBAN)', optAch: 'US bank account (ACH)', optCard: 'Bank card',
    optUsdc: 'USDC to wallet', optPayoneer: 'Payoneer',
  },
  ru: {
    logout: 'Выйти', connect: 'Подключение',
    connectHint: 'Вставьте существующий API-ключ или создайте тестовый аккаунт.',
    apiKeyLabel: 'API-ключ (sk_test_…)', connectBtn: 'Войти', createAcc: 'Создать тестовый аккаунт',
    payouts: 'Выплаты — куда вы получаете деньги', payoutsHint: 'Сюда поступают деньги после каждой оплаты.',
    method: 'Способ', savePayout: 'Сохранить реквизиты', saved: 'Сохранено ✓',
    newPayment: 'Новый платёж', amount: 'Сумма', currency: 'Валюта', description: 'Описание',
    createPay: 'Создать платёж + ссылку', payments: 'Платежи', refresh: 'Обновить',
    thAmount: 'Сумма', thStatus: 'Статус', thCrypto: 'Крипта', thPayout: 'Выплата',
    noPayments: 'Платежей пока нет.', openCheckout: 'Открыть оплату →',
    optSepa: 'SEPA-перевод (IBAN)', optAch: 'Счёт в США (ACH)', optCard: 'Банковская карта',
    optUsdc: 'USDC на кошелёк', optPayoneer: 'Payoneer',
  },
  uk: {
    logout: 'Вийти', connect: 'Підключення',
    connectHint: 'Вставте наявний API-ключ або створіть тестовий акаунт.',
    apiKeyLabel: 'API-ключ (sk_test_…)', connectBtn: 'Увійти', createAcc: 'Створити тестовий акаунт',
    payouts: 'Виплати — куди ви отримуєте кошти', payoutsHint: 'Сюди надходять кошти після кожної оплати.',
    method: 'Спосіб', savePayout: 'Зберегти реквізити', saved: 'Збережено ✓',
    newPayment: 'Новий платіж', amount: 'Сума', currency: 'Валюта', description: 'Опис',
    createPay: 'Створити платіж + посилання', payments: 'Платежі', refresh: 'Оновити',
    thAmount: 'Сума', thStatus: 'Статус', thCrypto: 'Крипта', thPayout: 'Виплата',
    noPayments: 'Платежів поки немає.', openCheckout: 'Відкрити оплату →',
    optSepa: 'SEPA-переказ (IBAN)', optAch: 'Рахунок у США (ACH)', optCard: 'Банківська картка',
    optUsdc: 'USDC на гаманець', optPayoneer: 'Payoneer',
  },
};
let LANG = localStorage.getItem('pays_lang') || 'en';
const t = (k) => (T[LANG] && T[LANG][k]) || T.en[k] || k;
function applyLang(lang) {
  LANG = lang; localStorage.setItem('pays_lang', lang);
  document.querySelectorAll('[data-i18n]').forEach((el) => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('.lang-btn').forEach((b) => b.classList.toggle('active', b.dataset.lang === lang));
  if (KEY && !$('#app').classList.contains('hide')) loadPayments();
}
document.querySelectorAll('.lang-btn').forEach((b) => (b.onclick = () => applyLang(b.dataset.lang)));

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'content-type': 'application/json', ...(KEY ? { authorization: 'Bearer ' + KEY } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error?.message || ('HTTP ' + res.status));
  return json;
}

$('#create').onclick = async () => {
  try {
    const r = await api('POST', '/v1/merchants', {
      name: 'Test Merchant', email: 'test+' + Date.now() + '@pays.dev', settlement_method: 'sepa',
      settlement_destination: { iban: 'DE89 3704 0044 0532 0130 00', name: 'Test Merchant GmbH' },
    });
    KEY = r.api_key.secret;
    $('#newkey').innerHTML = 'Your API key (save it): <code>' + KEY + '</code>';
    show('#newkey', true); $('#key').value = KEY;
    connect();
  } catch (e) { fail(e.message); }
};

$('#connect').onclick = () => { KEY = $('#key').value.trim(); connect(); };
$('#logout').onclick = () => { localStorage.removeItem('pays_key'); location.reload(); };

const DEST_KEY = { sepa: 'iban', ach: 'account', card: 'card', usdc: 'address', payoneer: 'email' };
const DEST_LABEL = {
  sepa: 'IBAN', ach: 'Account & routing number', card: 'Card number',
  usdc: 'Wallet address', payoneer: 'Payoneer email',
};
const DEST_PLACEHOLDER = {
  sepa: 'DE89 3704 0044 0532 0130 00',
  ach: '123456789 / 021000021',
  card: '4242 4242 4242 4242',
  usdc: '0x1234…abcd',
  payoneer: 'you@example.com',
};
const METHOD_SHORT = { sepa: 'SEPA', ach: 'ACH', card: 'Card', usdc: 'USDC', payoneer: 'Payoneer' };
function updateDestLabel() {
  const m = $('#smethod').value;
  $('#sdestLabel').textContent = DEST_LABEL[m];
  $('#sdest').placeholder = DEST_PLACEHOLDER[m];
}

async function connect() {
  if (!KEY) return fail('Enter an API key.');
  try {
    const me = await api('GET', '/v1/merchants/me');
    localStorage.setItem('pays_key', KEY);
    $('#who').textContent = me.name + ' · ' + me.email;
    show('#auth', false); show('#app', true); show('#logout', true);
    fillPayout(me);
    loadPayments();
  } catch (e) { fail('Could not connect: ' + e.message); }
}

function fillPayout(me) {
  $('#smethod').value = me.settlement_method || 'sepa';
  updateDestLabel();
  const key = DEST_KEY[$('#smethod').value];
  const dest = me.settlement_destination || {};
  $('#sdest').value = dest[key] || '';
}

$('#smethod').onchange = updateDestLabel;
$('#savePayout').onclick = async () => {
  try {
    const method = $('#smethod').value;
    const dest = {}; dest[DEST_KEY[method]] = $('#sdest').value.trim();
    await api('PATCH', '/v1/merchants/me', {
      settlement_method: method, settlement_destination: dest,
    });
    show('#payoutSaved', true);
    setTimeout(() => show('#payoutSaved', false), 2500);
  } catch (e) { fail(e.message); }
};

$('#createPay').onclick = async () => {
  try {
    const p = await api('POST', '/v1/payments', {
      amount: Number($('#amt').value), currency: $('#ccy').value, description: $('#pdesc').value,
    });
    const url = location.origin + '/checkout/' + p.id + '?cs=' + encodeURIComponent(p.client_secret);
    $('#link').innerHTML =
      'Checkout link: <a href="' + url + '" target="_blank">' + url + '</a>' +
      ' &nbsp; <button class="ghost" style="margin:0;padding:4px 10px" onclick="navigator.clipboard.writeText(\'' + url + '\')">Copy</button>';
    show('#link', true);
    loadPayments();
  } catch (e) { fail(e.message); }
};

$('#refresh').onclick = loadPayments;

async function loadPayments() {
  try {
    const list = await api('GET', '/v1/payments');
    const rows = $('#rows');
    if (!list.data.length) { rows.innerHTML = '<tr><td colspan="6" class="muted">' + t('noPayments') + '</td></tr>'; return; }
    rows.innerHTML = list.data.map((p) => {
      const url = location.origin + '/checkout/' + p.id + '?cs=' + encodeURIComponent(p.client_secret);
      const crypto = p.crypto ? (Number(p.crypto.amount).toFixed(6) + ' ' + p.crypto.currency) : '—';
      const open = ['CREATED','QUOTE_LOCKED'].includes(p.status)
        ? '<a href="' + url + '" target="_blank">' + t('openCheckout') + '</a>' : '';
      const sm = p.settlement || {};
      const dkey = DEST_KEY[sm.method] || 'iban';
      const dval = (sm.destination && sm.destination[dkey]) || '';
      const short = dval ? (dval.length > 16 ? dval.slice(0, 8) + '…' + dval.slice(-4) : dval) : '';
      const payout = (METHOD_SHORT[sm.method] || sm.method || '—') + (short ? ' · ' + short : '');
      return '<tr><td><code>' + p.id + '</code></td>' +
        '<td>' + p.amount.toFixed(2) + ' ' + p.currency + '</td>' +
        '<td><span class="pill s-' + p.status + '">' + p.status + '</span></td>' +
        '<td class="muted">' + crypto + '</td>' +
        '<td class="muted">' + payout + '</td>' +
        '<td>' + open + '</td></tr>';
    }).join('');
  } catch (e) { fail(e.message); }
}

applyLang(LANG);
if (KEY) { $('#key').value = KEY; connect(); }
</script>
</body>
</html>
