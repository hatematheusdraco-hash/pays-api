# One-command local stack: Postgres + the PayS API.
#   docker compose up --build
# Then open http://localhost:3000/dashboard
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pays
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pays']
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pays_pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pays
      NODE_ENV: production
      PORT: '3000'
    ports:
      - '3000:3000'
    # Apply migrations, then start the server.
    command: sh -c "node dist/scripts/migrate.js && node dist/src/server.js"

volumes:
  pays_pgdata:
